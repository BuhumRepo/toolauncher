name: ArylHive Build
on:
  workflow_dispatch:
    inputs:
      build_id:
        required: true
        type: string
      upload_url:
        required: true
        type: string
      callback_url:
        required: true
        type: string

jobs:
  build:
    name: Build and Upload Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm i -g pnpm && pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "package.json" ]; then
            npm install
          fi

      - name: Build Project
        run: npm run build

      - name: Package Artifact
        run: |
          if [ -d "dist" ]; then
            cd dist
          elif [ -d "dist" ]; then
            cd dist
          elif [ -d "out" ]; then
            cd out
          elif [ -d "build" ]; then
            cd build
          elif [ -d ".next" ]; then
            cd .next
          else
            echo "Error: Output directory not found!"
            exit 1
          fi
          zip -q -r ../build.zip .

      - name: Upload to ArylCloud
        run: |
          curl -X PUT "${{ inputs.upload_url }}" \
               --upload-file build.zip \
               -H "Content-Type: application/zip"

      - name: Notify ArylHive (Success)
        if: success()
        run: |
          curl -X POST "${{ inputs.callback_url }}" \
               -H "Content-Type: application/json" \
               -d '{"buildId": "${{ inputs.build_id }}", "previewId": "oyb06gi7ju", "status": "success", "r2Path": "labs/oyb06gi7ju/builds/${{ inputs.build_id }}.zip"}'

      - name: Notify ArylHive (Failure)
        if: failure()
        run: |
          curl -X POST "${{ inputs.callback_url }}" \
               -H "Content-Type: application/json" \
               -d '{"buildId": "${{ inputs.build_id }}", "previewId": "oyb06gi7ju", "status": "failed", "error": "GitHub Actions Build Failed"}'
