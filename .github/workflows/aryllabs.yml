name: ArylHive Build
on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      build_id:
        required: true
        type: string
      upload_url:
        required: true
        type: string
      callback_url:
        required: true
        type: string

env:
  CI: "false"
  NEXT_TELEMETRY_DISABLED: "1"
  ARYL_PREVIEW_ID: "prj_nv6xoqbuhvle"
  ARYL_ARTIFACT_PREFIX: "labs/prj_nv6xoqbuhvle/builds"
  ARYL_BUILD_CMD: "npm run build"
  ARYL_OUTPUT_DIR: "dist"

jobs:
  build:
    name: Build and Upload Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Build ID
        id: ids
        run: |
          if [ -n "${{ inputs.build_id }}" ]; then
            echo "build_id=${{ inputs.build_id }}" >> $GITHUB_OUTPUT
            echo "upload_url=${{ inputs.upload_url }}" >> $GITHUB_OUTPUT
            echo "callback_url=${{ inputs.callback_url }}" >> $GITHUB_OUTPUT
          else
            BUILD_ID="push_$(date +%s)_${{ github.sha }}"
            echo "build_id=${BUILD_ID:0:20}" >> $GITHUB_OUTPUT
            echo "upload_url=" >> $GITHUB_OUTPUT
            echo "callback_url=https://api.aryllabs.com/api/labs/webhook" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm i -g pnpm && pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci || (echo "Lockfile out of sync, falling back to npm install..." && npm install)
          elif [ -f "package.json" ]; then
            npm install
          fi

      - name: Build Project
        run: npm run build
        env:
          ARYL_NO_USER_ENV: "true"
      - name: Package Artifact
        run: |
          if [ -d "dist" ]; then
            cd dist
          elif [ -d "dist" ]; then
            cd dist
          elif [ -d "out" ]; then
            cd out
          elif [ -d "build" ]; then
            cd build
          elif [ -d ".next" ]; then
            cd .next
          else
            echo "Error: Output directory not found!"
            exit 1
          fi
          zip -q -r ../build.zip .

      - name: Upload to ArylCloud
        run: |
          UPLOAD_URL="${{ steps.ids.outputs.upload_url }}"
          if [ -n "$UPLOAD_URL" ]; then
            curl --retry 3 --retry-delay 5 --retry-all-errors --fail-with-body -X PUT "$UPLOAD_URL" \
                 --upload-file build.zip \
                 -H "Content-Type: application/zip"
          else
            SECRET="${{ secrets.ARYL_BUILD_SECRET }}"
            if [ -z "$SECRET" ]; then
              echo "Push-triggered build: No ARYL_BUILD_SECRET configured. Skipping upload."
              echo "To enable auto-deploy on push, add ARYL_BUILD_SECRET to your repository secrets."
              exit 0
            fi
            echo "Push-triggered build: uploading via API"
            curl --retry 3 --retry-delay 5 --retry-all-errors --fail-with-body -X PUT "https://api.aryllabs.com/api/labs/upload-push-build?previewId=prj_nv6xoqbuhvle&buildId=${{ steps.ids.outputs.build_id }}" \
                 --upload-file build.zip \
                 -H "Content-Type: application/zip" \
                 -H "Authorization: Bearer $SECRET"
          fi

      - name: Notify ArylHive (Success)
        if: success()
        run: |
          CALLBACK="${{ steps.ids.outputs.callback_url }}"
          if [ -z "$CALLBACK" ]; then
            echo "No callback URL (push-triggered). Skipping notification."
            exit 0
          fi
          if echo "$CALLBACK" | grep -q '?'; then
            FULL_URL="$CALLBACK&deployId=${{ steps.ids.outputs.build_id }}"
          else
            FULL_URL="$CALLBACK?deployId=${{ steps.ids.outputs.build_id }}"
          fi
          curl --retry 3 --retry-delay 5 --retry-all-errors --fail-with-body -X POST "$FULL_URL" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer ${{ secrets.ARYL_BUILD_SECRET }}" \
               -d '{"buildId": "${{ steps.ids.outputs.build_id }}", "previewId": "prj_nv6xoqbuhvle", "status": "success", "r2Path": "labs/prj_nv6xoqbuhvle/builds/${{ steps.ids.outputs.build_id }}.zip", "branch": "${{ github.ref_name }}"}'

      - name: Notify ArylHive (Failure)
        if: failure()
        run: |
          CALLBACK="${{ steps.ids.outputs.callback_url }}"
          if [ -z "$CALLBACK" ]; then
            echo "No callback URL (push-triggered). Skipping failure notification."
            exit 0
          fi
          if echo "$CALLBACK" | grep -q '?'; then
            FULL_URL="$CALLBACK&deployId=${{ steps.ids.outputs.build_id }}"
          else
            FULL_URL="$CALLBACK?deployId=${{ steps.ids.outputs.build_id }}"
          fi
          curl --retry 3 --retry-delay 5 --retry-all-errors --fail-with-body -X POST "$FULL_URL" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer ${{ secrets.ARYL_BUILD_SECRET }}" \
               -d '{"buildId": "${{ steps.ids.outputs.build_id }}", "previewId": "prj_nv6xoqbuhvle", "status": "failed", "error": "GitHub Actions Build Failed", "branch": "${{ github.ref_name }}"}'
